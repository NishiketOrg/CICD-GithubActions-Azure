name: Backend CI/CD

on:
  push:
    branches: [main]
    paths:
      - 'backend/**'
      - '.github/workflows/backend.yml'
  pull_request:
    branches: [main]
    paths:
      - 'backend/**'
      - '.github/workflows/backend.yml'

jobs:
  # ── CI: build + test on every push and PR ──────────────────────────────────
  ci:
    name: Build & Test
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET 8
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Restore dependencies
        run: dotnet restore backend/TodoApi.sln

      - name: Build
        run: dotnet build backend/TodoApi.sln --no-restore --configuration Release

      - name: Run tests
        run: dotnet test backend/TodoApi.sln --no-build --configuration Release --verbosity normal

  # ── CD: publish + deploy only when merged to main ──────────────────────────
  cd:
    name: Deploy to Azure App Service
    runs-on: ubuntu-latest
    needs: ci                          # only runs if CI job passes
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    permissions:
      id-token: write   # required for OIDC token exchange with Azure
      contents: read

    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET 8
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Publish
        run: dotnet publish backend/TodoApi/TodoApi.csproj --configuration Release --output publish

      - name: Login to Azure (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Deploy to App Service
        uses: azure/webapps-deploy@v3
        with:
          app-name: ${{ secrets.AZURE_WEBAPP_NAME }}
          package: publish
