name: Infrastructure

on:
  push:
    branches: [main]
    paths:
      - 'infra/**'
      - '.github/workflows/infra.yml'
  # Also allow triggering manually from the GitHub Actions UI
  workflow_dispatch:

jobs:
  deploy-infra:
    name: Deploy Bicep to Azure
    runs-on: ubuntu-latest

    permissions:
      id-token: write   # required for OIDC token exchange with Azure
      contents: read

    steps:
      - uses: actions/checkout@v4

      - name: Login to Azure (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      # Deploys at subscription scope — creates the resource group + all resources
      - name: Deploy Bicep
        uses: azure/arm-deploy@v2
        id: bicep
        with:
          scope: subscription
          region: eastus
          template: infra/main.bicep
          parameters: infra/main.bicepparam
          deploymentName: cicd-demo-${{ github.run_number }}
          failOnStdErr: false

      - name: Print deployment outputs
        run: |
          echo "Web App URL   : ${{ steps.bicep.outputs.webAppUrl }}"
          echo "Static Web App: ${{ steps.bicep.outputs.staticWebAppUrl }}"
          echo "SWA token is available as steps.bicep.outputs.staticWebAppDeploymentToken"
